version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: furniture_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: furniture_db
      MYSQL_USER: furniture_user
      MYSQL_PASSWORD: furniture_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - furniture_network

  phpmyadmin:
    image: phpmyadmin
    container_name: furniture_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: furniture_user
      PMA_PASSWORD: furniture_password
    ports:
      - "8080:80"
    networks:
      - furniture_network

volumes:
  mysql_data:

networks:
  furniture_network: